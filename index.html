<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>BHN Driver Attendance V4.1</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

video{
width:350px;
border:3px solid black;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.present{
background:#4caf50;
color:white;
}

.dashboard{
display:flex;
gap:20px;
margin-bottom:20px;
}

.card{
background:#eee;
padding:10px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>BHN Driver Face Attendance V4.1</h2>

<div class="dashboard">

<div class="card">Drivers: <span id="totalDrivers">0</span></div>
<div class="card">Present: <span id="presentCount">0</span></div>
<div class="card">Absent: <span id="absentCount">0</span></div>

</div>

<h3>Training Topic</h3>

<select id="topicSelect"></select>

<input id="newTopic" placeholder="New Topic">
<button onclick="addTopic()">Add Topic</button>

<hr>

<h3>Register Driver</h3>

<input id="driverName" placeholder="Driver Name">

<br><br>

<video id="video" autoplay muted></video>

<br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="captureFace()">Capture Face</button>
<button onclick="startRecognition()">Start Attendance</button>

<p id="scanStatus"></p>

<hr>

<h3>Attendance</h3>

<table>

<thead>

<tr>
<th>#</th>
<th>Name</th>
<th>Status</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

let drivers = JSON.parse(localStorage.getItem("drivers")) || []
let topics = JSON.parse(localStorage.getItem("topics")) || ["Orientation"]
let attendance = JSON.parse(localStorage.getItem("attendance")) || {}

let scanCount = 0
let tempDescriptors = []

const video = document.getElementById("video")

async function loadModels(){

await faceapi.nets.tinyFaceDetector.loadFromUri('weights')
await faceapi.nets.faceLandmark68Net.loadFromUri('weights')
await faceapi.nets.faceRecognitionNet.loadFromUri('weights')

}

function save(){

localStorage.setItem("drivers",JSON.stringify(drivers))
localStorage.setItem("topics",JSON.stringify(topics))
localStorage.setItem("attendance",JSON.stringify(attendance))

}

function speak(text){

const msg = new SpeechSynthesisUtterance(text)
speechSynthesis.speak(msg)

}

function loadTopics(){

const select=document.getElementById("topicSelect")
select.innerHTML=""

topics.forEach(t=>{

let o=document.createElement("option")
o.value=t
o.textContent=t

select.appendChild(o)

})

}

function addTopic(){

const t=document.getElementById("newTopic").value
if(!t) return

topics.push(t)

attendance[t]={}

drivers.forEach(d=>{
attendance[t][d.name]=false
})

save()
loadTopics()
render()

}

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({video:true})
video.srcObject=stream

}

async function captureFace(){

const name=document.getElementById("driverName").value
if(!name) return alert("Enter driver name")

const detection=await faceapi
.detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
.withFaceLandmarks()
.withFaceDescriptor()

if(!detection){

alert("Face not detected")
return

}

tempDescriptors.push(Array.from(detection.descriptor))

scanCount++

document.getElementById("scanStatus").innerText =
"Face Scan "+scanCount+" / 3"

if(scanCount===3){

drivers.push({
name,
descriptors:tempDescriptors
})

topics.forEach(t=>{

if(!attendance[t]) attendance[t]={}
attendance[t][name]=false

})

scanCount=0
tempDescriptors=[]

save()
render()

alert("Driver Registered")

}

}

async function startRecognition(){

setInterval(async ()=>{

const detections=await faceapi
.detectAllFaces(video,new faceapi.TinyFaceDetectorOptions())
.withFaceLandmarks()
.withFaceDescriptors()

detections.forEach(d=>{

let bestMatch=null
let min=0.5

drivers.forEach(driver=>{

driver.descriptors.forEach(desc=>{

const dist=faceapi.euclideanDistance(
d.descriptor,
new Float32Array(desc)
)

if(dist<min){

min=dist
bestMatch=driver.name

}

})

})

if(bestMatch){

const topic=document.getElementById("topicSelect").value

if(!attendance[topic][bestMatch]){

attendance[topic][bestMatch]=true

speak("Attendance recorded for "+bestMatch)

save()
render()

}

}

})

},2000)

}

function render(){

const tbody=document.getElementById("tableBody")
tbody.innerHTML=""

const topic=document.getElementById("topicSelect").value

let present=0

drivers.forEach((d,i)=>{

const status=attendance[topic] && attendance[topic][d.name]

if(status) present++

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${i+1}</td>
<td>${d.name}</td>
<td class="${status?'present':''}">
${status?'Present':'Absent'}
</td>

`

tbody.appendChild(tr)

})

document.getElementById("totalDrivers").innerText=drivers.length
document.getElementById("presentCount").innerText=present
document.getElementById("absentCount").innerText=drivers.length-present

}

async function init(){

await loadModels()

loadTopics()

if(!attendance[topics[0]]){

attendance[topics[0]]={}

drivers.forEach(d=>{
attendance[topics[0]][d.name]=false
})

}

render()

}

init()

</script>

</body>
</html>
