<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BHN AI Driver Attendance</title>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
text-align:center;
margin:0;
}

header{
background:#1e2a78;
color:white;
padding:15px;
font-size:22px;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin:15px 0;
}

input,select,button{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#1e2a78;
color:white;
cursor:pointer;
}

video{
border:3px solid #333;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#1e2a78;
color:white;
}

</style>
</head>

<body>

<header>BHN AI Driver Attendance System</header>

<div class="container">

<h3>Register Driver</h3>

<div class="controls">

<input id="name" placeholder="Driver Name">
<input id="driverId" placeholder="Driver ID">
<input id="phone" placeholder="Phone">

<button onclick="registerDriver()">Register Face</button>

</div>

<video id="video" width="400" height="300" autoplay muted></video>

<h3>Training Session</h3>

<div class="controls">

<select id="topic">
<option value="">Select Topic</option>
<option>TYRE & SAFETY</option>
<option>JOURNEY MANAGEMENT</option>
<option>DEFENSIVE DRIVING</option>
<option>VEHICLE MAINTENANCE</option>
</select>

<button onclick="startSession()">Start Session</button>
<button onclick="exportExcel()">Export Excel</button>

</div>

<h3>Attendance</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>ID</th>
<th>Phone</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

let drivers = JSON.parse(localStorage.getItem("drivers")) || []
let sessions = JSON.parse(localStorage.getItem("sessions")) || {}

let currentTopic=""
let today=new Date().toISOString().split("T")[0]

let labeledDescriptors=[]

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({video:true})

document.getElementById("video").srcObject=stream

}

startCamera()



async function loadModels(){

await faceapi.nets.tinyFaceDetector.loadFromUri("./weights")
await faceapi.nets.faceLandmark68Net.loadFromUri("./weights")
await faceapi.nets.faceRecognitionNet.loadFromUri("./weights")

}

loadModels()



async function registerDriver(){

let name=document.getElementById("name").value
let id=document.getElementById("driverId").value
let phone=document.getElementById("phone").value

if(!name||!id||!phone){

alert("Fill all fields")
return

}

const video=document.getElementById("video")

const detection=await faceapi.detectSingleFace(video,new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor()

if(!detection){

alert("Face not detected")

return

}

drivers.push({

name,
id,
phone,
descriptor:Array.from(detection.descriptor)

})

save()

alert("Driver registered")

buildDescriptors()

renderTable()

}



function save(){

localStorage.setItem("drivers",JSON.stringify(drivers))
localStorage.setItem("sessions",JSON.stringify(sessions))

}



function startSession(){

let topic=document.getElementById("topic").value

if(!topic){

alert("Select topic")

return

}

currentTopic=topic

let key=topic+"_"+today

if(!sessions[key]){

sessions[key]={}

drivers.forEach(d=>sessions[key][d.id]=false)

}

save()

renderTable()

}



function renderTable(){

let tbody=document.getElementById("tableBody")

tbody.innerHTML=""

let key=currentTopic+"_"+today

drivers.forEach(d=>{

let present=sessions[key]?.[d.id]

let row=document.createElement("tr")

row.innerHTML=`

<td>${d.name}</td>
<td>${d.id}</td>
<td>${d.phone}</td>
<td>${present?"Present":"Absent"}</td>

`

tbody.appendChild(row)

})

}



async function buildDescriptors(){

labeledDescriptors=drivers.map(d=>

new faceapi.LabeledFaceDescriptors(

d.id,

[new Float32Array(d.descriptor)]

)

)

}



setInterval(async()=>{

if(!currentTopic)return

const video=document.getElementById("video")

const detections=await faceapi.detectAllFaces(video,new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors()

if(!detections.length)return

const matcher=new faceapi.FaceMatcher(labeledDescriptors)

detections.forEach(d=>{

const match=matcher.findBestMatch(d.descriptor)

if(match.label!=="unknown"){

markAttendance(match.label)

}

})

},2000)



function markAttendance(id){

let key=currentTopic+"_"+today

if(!sessions[key])return

sessions[key][id]=true

save()

renderTable()

}



function exportExcel(){

let key=currentTopic+"_"+today

let data=[["Name","ID","Phone","Present"]]

drivers.forEach(d=>{

data.push([

d.name,
d.id,
d.phone,
sessions[key][d.id]?"YES":"NO"

])

})

let ws=XLSX.utils.aoa_to_sheet(data)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,currentTopic)

XLSX.writeFile(wb,currentTopic+"_"+today+".xlsx")

}



buildDescriptors()

renderTable()

</script>

</body>
</html>
