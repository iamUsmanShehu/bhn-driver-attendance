<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BHN Driver Attendance V3</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px;
margin:5px;
cursor:pointer;
}

select,input{
padding:8px;
margin:5px;
}

video{
border:2px solid black;
width:320px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.present{
background:#8bc34a;
color:white;
}

.absent{
background:#f44336;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>BHN Driver Attendance V3</h1>

<h3>Training Topic</h3>

<select id="topicSelect"></select>
<input id="newTopic" placeholder="Add new topic">
<button onclick="addTopic()">Add Topic</button>

<hr>

<h3>Register Driver</h3>

<input id="driverName" placeholder="Driver Name">
<br>

<video id="video" autoplay muted></video>
<br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="registerDriver()">Register Driver</button>

<hr>

<h3>Drivers</h3>

<table id="driverTable">
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Attendance</th>
<th>Delete</th>
</tr>
</thead>
<tbody></tbody>
</table>

<br>

<button onclick="exportCSV()">Export CSV</button>

</div>

<script>

let drivers = JSON.parse(localStorage.getItem("drivers")) || []
let topics = JSON.parse(localStorage.getItem("topics")) || ["Orientation"]
let attendance = JSON.parse(localStorage.getItem("attendance")) || {}

const video = document.getElementById("video")

function saveData(){
localStorage.setItem("drivers",JSON.stringify(drivers))
localStorage.setItem("topics",JSON.stringify(topics))
localStorage.setItem("attendance",JSON.stringify(attendance))
}

function loadTopics(){

const select=document.getElementById("topicSelect")
select.innerHTML=""

topics.forEach(t=>{
let option=document.createElement("option")
option.value=t
option.textContent=t
select.appendChild(option)
})

}

function addTopic(){

const topic=document.getElementById("newTopic").value
if(!topic) return

topics.push(topic)

attendance[topic]={}

drivers.forEach(d=>{
attendance[topic][d.id]=false
})

saveData()
loadTopics()
renderTable()

}

async function startCamera(){

const stream = await navigator.mediaDevices.getUserMedia({video:true})
video.srcObject=stream

}

function registerDriver(){

const name=document.getElementById("driverName").value
if(!name) return

const id=Date.now()

drivers.push({
id,
name
})

topics.forEach(topic=>{

if(!attendance[topic])
attendance[topic]={}

attendance[topic][id]=false

})

saveData()
renderTable()

}

function toggleAttendance(id){

const topic=document.getElementById("topicSelect").value

attendance[topic][id]=!attendance[topic][id]

saveData()
renderTable()

}

function deleteDriver(id){

drivers=drivers.filter(d=>d.id!=id)

topics.forEach(topic=>{
delete attendance[topic][id]
})

saveData()
renderTable()

}

function renderTable(){

const tbody=document.querySelector("#driverTable tbody")

tbody.innerHTML=""

const topic=document.getElementById("topicSelect").value

drivers.forEach((d,i)=>{

const tr=document.createElement("tr")

const present=attendance[topic] && attendance[topic][d.id]

tr.innerHTML=`

<td>${i+1}</td>

<td>${d.name}</td>

<td>
<button class="${present?'present':'absent'}"
onclick="toggleAttendance(${d.id})">
${present?'Present':'Absent'}
</button>
</td>

<td>
<button onclick="deleteDriver(${d.id})">Delete</button>
</td>

`

tbody.appendChild(tr)

})

}

function exportCSV(){

const topic=document.getElementById("topicSelect").value

let csv="Name,Attendance\n"

drivers.forEach(d=>{
let status=attendance[topic][d.id]?"Present":"Absent"
csv+=`${d.name},${status}\n`
})

const blob=new Blob([csv])

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download=`attendance_${topic}.csv`

a.click()

}

document.getElementById("topicSelect").addEventListener("change",renderTable)

function init(){

loadTopics()

if(!attendance[topics[0]]){

attendance[topics[0]]={}

drivers.forEach(d=>{
attendance[topics[0]][d.id]=false
})

}

renderTable()

}

init()

</script>

</body>
</html>
